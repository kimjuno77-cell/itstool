<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HVAC 설비 발열량 계산기 (E-glass 보온 반영)</title>
    <!-- Tailwind CSS CDN -->
    <script src="libs/tailwind.js"></script>
    <!-- React 및 Babel CDN -->
    <script src="libs/react.production.min.js"></script>
    <script src="libs/react-dom.production.min.js"></script>
    <script src="libs/babel.min.js"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            .print-card { border: 1px solid #e2e8f0 !important; box-shadow: none !important; }
            .bg-slate-800 { background-color: white !important; color: black !important; border: 1px solid #ddd; }
            .text-blue-400, .text-emerald-400 { color: black !important; }
        }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            opacity: 1;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 아이콘 컴포넌트 (SVG 직접 구현)
        const IconPlus = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
        const IconFactory = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 20V9l9-2 10 2v11"></path><path d="M9 20V5l10 2v13"></path><line x1="2" y1="20" x2="22" y2="20"></line><line x1="7" y1="20" x2="7" y2="15"></line></svg>;
        const IconZap = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
        const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
        const IconCalculator = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="18"></line><path d="M16 10h.01"></path><path d="M12 10h.01"></path><path d="M8 10h.01"></path><path d="M12 14h.01"></path><path d="M8 14h.01"></path><path d="M12 18h.01"></path><path d="M8 18h.01"></path></svg>;
        const IconBulb = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A5 5 0 0 0 8 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"></path><line x1="9" y1="18" x2="15" y2="18"></line><line x1="10" y1="22" x2="14" y2="22"></line></svg>;
        const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconBox = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>;
        const IconShield = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>;

        const App = () => {
            const [items, setItems] = useState([]);
            const [totalWatts, setTotalWatts] = useState(0);
            const W_TO_KCAL = 0.86;
            const INSULATION_FACTOR = 0.25; // E-glass fiber 적용 시 75% 차단 계수

            const addMotor = () => setItems([...items, { id: Date.now(), type: 'motor', name: '신규 모터', power: 11, efficiency: 90, loadFactor: 0.8, count: 1, location: 'both_in', isInsulated: false }]);
            const addPanel = () => setItems([...items, { id: Date.now(), type: 'panel', name: '전기 판넬', capacity: 50, lossRate: 3, count: 1 }]);
            const addLighting = () => setItems([...items, { id: Date.now(), type: 'lighting', name: '조명 부하', wattPerArea: 15, area: 100, count: 1 }]);
            const addPeople = () => setItems([...items, { id: Date.now(), type: 'people', name: '인체 발열', heatPerPerson: 100, personCount: 10, count: 1 }]);
            const addMisc = () => setItems([...items, { id: Date.now(), type: 'misc', name: '기타 공정 장비', power: 5, usageRate: 0.5, count: 1 }]);

            const removeItem = (id) => setItems(items.filter(item => item.id !== id));
            const updateItem = (id, field, value) => setItems(items.map(item => item.id === id ? { ...item, [field]: value } : item));

            const getItemCalculation = (item) => {
                let formula = "";
                let result = 0;

                switch(item.type) {
                    case 'motor':
                        const p = (parseFloat(item.power) || 0);
                        const eff = (parseFloat(item.efficiency) || 1) / 100;
                        const lf = parseFloat(item.loadFactor) || 0;
                        const n = parseInt(item.count) || 0;
                        const insFactor = item.isInsulated ? INSULATION_FACTOR : 1;
                        const insText = item.isInsulated ? ` × ${INSULATION_FACTOR}(보온)` : "";

                        if (item.location === 'both_in') {
                            formula = `Q = (P / η) × L × n${insText} = (${p} / ${eff.toFixed(2)}) × ${lf} × ${n}${insText}`;
                            result = (p * 1000 / eff) * lf * n * insFactor;
                        } else if (item.location === 'motor_in') {
                            formula = `Q = P × ((1-η)/η) × L × n${insText} = ${p} × ((1-${eff.toFixed(2)})/${eff.toFixed(2)}) × ${lf} × ${n}${insText}`;
                            result = (p * 1000) * ((1 - eff) / eff) * lf * n * insFactor;
                        } else {
                            formula = `Q = P × L × n = ${p} × ${lf} × ${n}`;
                            result = (p * 1000) * lf * n;
                        }
                        break;
                    case 'panel':
                        const cap = parseFloat(item.capacity) || 0;
                        const loss = (parseFloat(item.lossRate) || 0) / 100;
                        const pn = parseInt(item.count) || 0;
                        formula = `Q = Cap × Loss × n = ${cap} × ${loss.toFixed(3)} × ${pn}`;
                        result = (cap * 1000) * loss * pn;
                        break;
                    case 'lighting':
                        const wpa = parseFloat(item.wattPerArea) || 0;
                        const area = parseFloat(item.area) || 0;
                        const ln = parseInt(item.count) || 0;
                        formula = `Q = W/m² × Area × n = ${wpa} × ${area} × ${ln}`;
                        result = wpa * area * ln;
                        break;
                    case 'people':
                        const hpp = parseFloat(item.heatPerPerson) || 0;
                        const pc = parseInt(item.personCount) || 0;
                        const sn = parseInt(item.count) || 0;
                        formula = `Q = Heat/Person × Count × n = ${hpp} × ${pc} × ${sn}`;
                        result = hpp * pc * sn;
                        break;
                    case 'misc':
                        const mp = parseFloat(item.power) || 0;
                        const ur = parseFloat(item.usageRate) || 0;
                        const mn = parseInt(item.count) || 0;
                        formula = `Q = P × UsageRate × n = ${mp} × ${ur} × ${mn}`;
                        result = (mp * 1000) * ur * mn;
                        break;
                }
                return { formula, result };
            };

            const calculateItemHeat = (item) => getItemCalculation(item).result;

            useEffect(() => {
                const total = items.reduce((acc, item) => acc + calculateItemHeat(item), 0);
                setTotalWatts(total);
            }, [items]);

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans text-slate-900 bg-slate-50">
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-8 flex flex-col xl:flex-row xl:items-center justify-between gap-4">
                            <div>
                                <h1 className="text-3xl font-bold text-slate-800 flex items-center gap-2">
                                    <IconFactory /> HVAC 설비 발열량 종합 계산기
                                </h1>
                                <p className="text-slate-500 mt-1">공장동 설비, 조명, 인체 및 기타 공정 부하 산출 (E-glass 보온 반영)</p>
                            </div>
                            <div className="flex flex-wrap gap-2 no-print">
                                <button onClick={addMotor} className="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg text-sm transition-all shadow-sm active:scale-95"><IconPlus /> 모터</button>
                                <button onClick={addPanel} className="flex items-center gap-1.5 bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-lg text-sm transition-all shadow-sm active:scale-95"><IconPlus /> 판넬</button>
                                <button onClick={addLighting} className="flex items-center gap-1.5 bg-amber-500 hover:bg-amber-600 text-white px-3 py-1.5 rounded-lg text-sm transition-all shadow-sm active:scale-95"><IconPlus /> 조명</button>
                                <button onClick={addPeople} className="flex items-center gap-1.5 bg-rose-500 hover:bg-rose-600 text-white px-3 py-1.5 rounded-lg text-sm transition-all shadow-sm active:scale-95"><IconPlus /> 인체</button>
                                <button onClick={addMisc} className="flex items-center gap-1.5 bg-slate-600 hover:bg-slate-700 text-white px-3 py-1.5 rounded-lg text-sm transition-all shadow-sm active:scale-95"><IconPlus /> 기타</button>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2 space-y-4">
                                {items.length === 0 ? (
                                    <div className="bg-white border-2 border-dashed border-slate-200 rounded-xl p-12 text-center text-slate-400">
                                        <p>상단 버튼을 눌러 계산 항목을 추가해 주세요.</p>
                                    </div>
                                ) : (
                                    items.map((item) => {
                                        const { formula, result } = getItemCalculation(item);
                                        const colorClass = item.type === 'motor' ? 'bg-blue-500' : 
                                                           item.type === 'panel' ? 'bg-emerald-500' :
                                                           item.type === 'lighting' ? 'bg-amber-500' :
                                                           item.type === 'people' ? 'bg-rose-500' : 'bg-slate-500';
                                        const icon = item.type === 'motor' ? <IconSettings /> : 
                                                     item.type === 'panel' ? <IconZap /> :
                                                     item.type === 'lighting' ? <IconBulb /> :
                                                     item.type === 'people' ? <IconUsers /> : <IconBox />;

                                        return (
                                            <div key={item.id} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden print-card transition-shadow hover:shadow-md">
                                                <div className={`h-1.5 w-full ${colorClass}`} />
                                                <div className="p-4 md:p-6">
                                                    <div className="flex justify-between items-start mb-4">
                                                        <div className="flex items-center gap-3">
                                                            <div className={`p-2 rounded-lg opacity-80 ${colorClass} text-white`}>{icon}</div>
                                                            <input type="text" value={item.name} onChange={(e) => updateItem(item.id, 'name', e.target.value)} className="font-bold text-lg focus:outline-none border-b border-transparent focus:border-slate-300 px-1" />
                                                        </div>
                                                        <div className="flex items-center gap-3">
                                                            {item.type === 'motor' && (
                                                                <button 
                                                                    onClick={() => updateItem(item.id, 'isInsulated', !item.isInsulated)}
                                                                    className={`flex items-center gap-1 px-2 py-1 rounded text-[11px] font-bold transition-all border ${item.isInsulated ? 'bg-blue-50 border-blue-200 text-blue-600' : 'bg-slate-50 border-slate-200 text-slate-400'}`}
                                                                >
                                                                    <IconShield /> 보온(E-glass)
                                                                </button>
                                                            )}
                                                            <button onClick={() => removeItem(item.id)} className="text-slate-400 hover:text-red-500 transition-colors p-1 no-print"><IconTrash /></button>
                                                        </div>
                                                    </div>

                                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4 text-sm">
                                                        {item.type === 'motor' && (
                                                            <>
                                                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">정격(kW)</label>
                                                                <input type="number" value={item.power} onChange={(e) => updateItem(item.id, 'power', e.target.value)} className="w-full bg-slate-50 border rounded px-2 py-1 outline-none" /></div>
                                                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">효율(%)</label>
                                                                <input type="number" value={item.efficiency} onChange={(e) => updateItem(item.id, 'efficiency', e.target.value)} className="w-full bg-slate-50 border rounded px-2 py-1 outline-none" /></div>
                                                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">가동률</label>
                                                                <input type="number" step="0.1" value={item.loadFactor} onChange={(e) => updateItem(item.id, 'loadFactor', e.target.value)} className="w-full bg-slate-50 border rounded px-2 py-1 outline-none" /></div>
                                                                <div className="col-span-2 md:col-span-4"><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">설치 조건 (발열 범위)</label>
                                                                <select value={item.location} onChange={(e) => updateItem(item.id, 'location', e.target.value)} className="w-full bg-slate-50 border rounded px-2 py-1.5 text-xs outline-none">
                                                                    <option value="both_in">모터 및 기기 모두 실내 (Full Load Heat)</option>
                                                                    <option value="motor_in">모터만 실내, 기기 실외 (Motor Loss Only)</option>
                                                                    <option value="machine_in">모터 실외, 기기 실내 (Machine Power Heat)</option>
                                                                </select></div>
                                                            </>
                                                        )}
                                                        {item.type === 'panel' && (
                                                            <>
                                                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">용량(kVA)</label>
                                                                <input type="number" value={item.capacity} onChange={(e) => updateItem(item.id, 'capacity', e.target.value)} className="w-full bg-slate-50 border rounded px-2 py-1 outline-none" /></div>
                                                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">손실률(%)</label>
                                                                <input type="number" value={item.lossRate} onChange={(e) => updateItem(item.id, 'lossRate', e.target.value)} className="w-full bg-slate-50 border rounded px-2 py-1 outline-none" /></div>
                                                            </>
                                                        )}
                                                        {item.type === 'lighting' && (
                                                            <>
                                                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">W/m²</label>
                                                                <input type="number" value={item.wattPerArea} onChange={(e) => updateItem(item.id, 'wattPerArea', e.target.value)} className="w-full bg-slate-50 border rounded px-2 py-1 outline-none" /></div>
                                                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">면적(m²)</label>
                                                                <input type="number" value={item.area} onChange={(e) => updateItem(item.id, 'area', e.target.value)} className="w-full bg-slate-50 border rounded px-2 py-1 outline-none" /></div>
                                                            </>
                                                        )}
                                                        {item.type === 'people' && (
                                                            <>
                                                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">발열량(W/인)</label>
                                                                <input type="number" value={item.heatPerPerson} onChange={(e) => updateItem(item.id, 'heatPerPerson', e.target.value)} className="w-full bg-slate-50 border rounded px-2 py-1 outline-none" /></div>
                                                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">인원수</label>
                                                                <input type="number" value={item.personCount} onChange={(e) => updateItem(item.id, 'personCount', e.target.value)} className="w-full bg-slate-50 border rounded px-2 py-1 outline-none" /></div>
                                                            </>
                                                        )}
                                                        {item.type === 'misc' && (
                                                            <>
                                                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">정격(kW)</label>
                                                                <input type="number" value={item.power} onChange={(e) => updateItem(item.id, 'power', e.target.value)} className="w-full bg-slate-50 border rounded px-2 py-1 outline-none" /></div>
                                                                <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">가동률</label>
                                                                <input type="number" step="0.1" value={item.usageRate} onChange={(e) => updateItem(item.id, 'usageRate', e.target.value)} className="w-full bg-slate-50 border rounded px-2 py-1 outline-none" /></div>
                                                            </>
                                                        )}
                                                        <div><label className="block text-[10px] font-bold text-slate-500 uppercase mb-1">수량(n)</label>
                                                        <input type="number" value={item.count} onChange={(e) => updateItem(item.id, 'count', e.target.value)} className="w-full bg-slate-50 border rounded px-2 py-1 outline-none" /></div>
                                                    </div>

                                                    <div className="bg-slate-50 rounded-lg p-3 border border-slate-100 text-[11px] font-mono text-slate-500 leading-tight">
                                                        <div className="mb-1 text-[9px] font-sans font-bold text-slate-400 uppercase tracking-tighter">Calculation Basis</div>
                                                        {formula} = <span className="text-slate-700 font-bold">{(result/1000).toFixed(3)} kW</span>
                                                    </div>

                                                    <div className="mt-4 pt-4 border-t border-slate-100 flex justify-end items-baseline gap-2">
                                                        <span className="text-sm text-slate-400 font-medium">Result Heat:</span>
                                                        <span className="font-mono font-bold text-slate-700 text-lg">{result.toLocaleString(undefined, {maximumFractionDigits: 1})} W</span>
                                                        <span className="text-sm text-slate-400">/ {(result * W_TO_KCAL).toLocaleString(undefined, {maximumFractionDigits: 1})} kcal/h</span>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })
                                )}
                            </div>

                            <div className="lg:col-span-1">
                                <div className="bg-slate-800 text-white rounded-2xl p-6 sticky top-8 shadow-xl border border-slate-700">
                                    <h2 className="text-xl font-bold mb-6 flex items-center gap-2 border-b border-slate-700 pb-4">
                                        <IconCalculator /> Total Analysis
                                    </h2>
                                    <div className="space-y-6">
                                        <div>
                                            <p className="text-slate-400 text-xs mb-1 uppercase font-semibold tracking-wider">Total Watts</p>
                                            <p className="text-5xl font-mono font-bold text-blue-400">
                                                {totalWatts.toLocaleString(undefined, {maximumFractionDigits: 1})} <span className="text-xl">W</span>
                                            </p>
                                        </div>
                                        <div className="pt-6 border-t border-slate-700">
                                            <p className="text-slate-400 text-xs mb-1 uppercase font-semibold tracking-wider">Total kcal/h</p>
                                            <p className="text-5xl font-mono font-bold text-emerald-400">
                                                {(totalWatts * W_TO_KCAL).toLocaleString(undefined, {maximumFractionDigits: 1})} <span className="text-xl text-nowrap">kcal/h</span>
                                            </p>
                                        </div>
                                        <div className="bg-slate-700/50 rounded-xl p-4 mt-4 text-[11px] leading-relaxed text-slate-300">

                                                <li><strong>모터 손실:</strong> 비효율($1-\eta$)에 따른 현열 발생량 반영</li>

        };
