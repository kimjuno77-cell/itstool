<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배관 발열량 산출 보고서 - V2</title>
    
    <!-- React & Babel CDN -->
    <script src="libs/react.production.min.js"></script>
    <script src="libs/react-dom.production.min.js"></script>
    <script src="libs/babel.min.js"></script>
    
    <!-- Tailwind CSS CDN -->
    <script src="libs/tailwind.js"></script>
    
    <!-- Lucide Icons -->
    <script src="libs/lucide.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; padding: 0; margin: 0; }
            .report-container { border: none; padding: 0; border-radius: 0; box-shadow: none; width: 100%; max-width: 100%; }
            .step-box { border: 1px solid #e2e8f0 !important; page-break-inside: avoid; }
            @page { margin: 1.5cm; size: A4; }
        }
        .print-only { display: none; }
        
        .math-font { font-family: "Times New Roman", Times, serif; font-style: italic; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const PIPE_SIZES = [
            { name: '15A', od: 21.7 }, { name: '20A', od: 27.2 }, { name: '25A', od: 34.0 },
            { name: '32A', od: 42.7 }, { name: '40A', od: 48.6 }, { name: '50A', od: 60.5 },
            { name: '65A', od: 76.3 }, { name: '80A', od: 89.1 }, { name: '100A', od: 114.3 },
            { name: '125A', od: 139.8 }, { name: '150A', od: 165.2 }, { name: '200A', od: 216.3 },
            { name: '250A', od: 267.4 }, { name: '300A', od: 318.5 }, { name: '350A', od: 355.6 },
            { name: '400A', od: 406.4 }, { name: '450A', od: 457.2 }, { name: '500A', od: 508.0 },
            { name: '550A', od: 558.8 }, { name: '600A', od: 609.6 }, { name: '650A', od: 660.4 },
            { name: '700A', od: 711.2 }, { name: '750A', od: 762.0 }, { name: '800A', od: 812.8 },
        ];

        const PIPE_MATERIALS = [
            { name: 'Stainless Steel (STS304/316)', k: 16 },
            { name: 'Carbon Steel (SGP/STPY)', k: 50 },
        ];

        const INSULATION_TYPES = [
            { name: 'E-glass fiber (고온용)', k: 0.050 },
            { name: '그라스울 (Glass Wool)', k: 0.035 },
            { name: '암면 (Rock Wool)', k: 0.038 },
            { name: '고무발포 (NBR/EPDM)', k: 0.034 },
            { name: '가교발포 폴리에틸렌 (PE)', k: 0.040 },
        ];

        function App() {
            const [pipeSize, setPipeSize] = useState(PIPE_SIZES[15]); 
            const [pipeMaterial, setPipeMaterial] = useState(PIPE_MATERIALS[0]); 
            const [fluidTemp, setFluidTemp] = useState(380);
            const [ambientTemp, setAmbientTemp] = useState(20);
            const [length, setLength] = useState(10);
            const [insulationType, setInsulationType] = useState(INSULATION_TYPES[0]); 
            const [insulationThick, setInsulationThick] = useState(50);
            const [showDetails, setShowDetails] = useState(true);
            const [isPrinting, setIsPrinting] = useState(false);
            
            const [projectTitle, setProjectTitle] = useState("");
            const [clientName, setClientName] = useState("");
            const [engineerName, setEngineerName] = useState("");

            const [calcData, setCalcData] = useState({
                r1: 0, r2: 0, k_adj: 0, dT: 0, h: 8.5, resInsul: 0, resConv: 0, watts: 0, kcal: 0
            });

            useEffect(() => {
                calculateHeatLoss();
                // Re-initialize Lucide icons after state changes
                if (window.lucide) window.lucide.createIcons();
            }, [pipeSize, pipeMaterial, fluidTemp, ambientTemp, length, insulationType, insulationThick]);

            const calculateHeatLoss = () => {
                const r1 = pipeSize.od / 2 / 1000;
                const r2 = r1 + (insulationThick / 1000);
                const dT = Math.abs(fluidTemp - ambientTemp);
                const h = 8.5; 

                let k_adj = insulationType.k;
                if (insulationType.name === 'E-glass fiber (고온용)') {
                    const meanTemp = (fluidTemp + ambientTemp) / 2;
                    k_adj = 0.038 + (meanTemp * 0.00008); 
                }

                const resInsul = Math.log(r2 / r1) / k_adj;
                const resConv = 1 / (h * r2);
                
                const heatLossWatts = (2 * Math.PI * length * dT) / (resInsul + resConv);
                const heatLossKcal = heatLossWatts * 0.86;

                setCalcData({
                    r1, r2, k_adj, dT, h, resInsul, resConv,
                    watts: heatLossWatts,
                    kcal: heatLossKcal
                });
            };

            const handlePrint = () => {
                setIsPrinting(true);
                // Ensure focus for iframe environments
                window.focus();
                setTimeout(() => {
                    window.print();
                    setIsPrinting(false);
                }, 300);
            };

            return (
                <div className="p-4 md:p-8 transition-all">
                    <div className="max-w-6xl mx-auto report-container">
                        {/* Header Section */}
                        <header className="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4 no-print">
                            <div className="flex items-center gap-4">
                                <div className="bg-indigo-600 p-3 rounded-2xl text-white shadow-lg">
                                    <i data-lucide="calculator" className="w-8 h-8"></i>
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black tracking-tight">배관 발열량 산출 보고서</h1>
                                    <p className="text-slate-500 font-medium font-xs uppercase">High Temperature HVAC Engineering Tool</p>
                                </div>
                            </div>
                            
                            <div className="flex gap-2">
                                <button 
                                    onClick={handlePrint}
                                    className={`flex items-center gap-2 px-6 py-3 rounded-xl font-bold transition-all shadow-md active:scale-95 ${
                                        isPrinting ? 'bg-emerald-500 text-white' : 'bg-slate-800 text-white hover:bg-slate-700'
                                    }`}
                                >
                                    <i data-lucide="printer" className="w-5 h-5"></i>
                                    {isPrinting ? "출력 진행 중..." : "PDF 보고서 인쇄"}
                                </button>
                            </div>
                        </header>

                        {/* Project Info Section - no-print */}
                        <div className="no-print bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-6">
                            <h2 className="flex items-center gap-2 text-sm font-bold mb-4 text-slate-700 uppercase tracking-widest">
                                <i data-lucide="file-edit" className="w-4 h-4 text-indigo-500"></i> Project Data
                            </h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div className="space-y-1">
                                    <span className="text-[10px] font-bold text-slate-400 ml-1">PROJECT NAME</span>
                                    <input placeholder="프로젝트명을 입력하세요" className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" value={projectTitle} onChange={(e) => setProjectTitle(e.target.value)} />
                                </div>
                                <div className="space-y-1">
                                    <span className="text-[10px] font-bold text-slate-400 ml-1">CLIENT</span>
                                    <input placeholder="사업주/발주처" className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" value={clientName} onChange={(e) => setClientName(e.target.value)} />
                                </div>
                                <div className="space-y-1">
                                    <span className="text-[10px] font-bold text-slate-400 ml-1">ENGINEER</span>
                                    <input placeholder="성명" className="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500" value={engineerName} onChange={(e) => setEngineerName(e.target.value)} />
                                </div>
                            </div>
                        </div>

                        {/* Report Header - print-only */}
                        <div className="print-only mb-10 border-b-4 border-slate-900 pb-8">
                            <h1 className="text-4xl font-black text-center mb-10 uppercase tracking-tighter">Heat Loss Calculation Report</h1>
                            <div className="grid grid-cols-2 gap-x-12 gap-y-4 text-sm">
                                <div className="flex justify-between border-b border-slate-200 pb-1">
                                    <span className="font-bold text-slate-500">Project Title:</span>
                                    <span className="font-bold text-slate-900">{projectTitle || "-"}</span>
                                </div>
                                <div className="flex justify-between border-b border-slate-200 pb-1">
                                    <span className="font-bold text-slate-500">Date:</span>
                                    <span className="font-bold text-slate-900">{new Date().toLocaleDateString()}</span>
                                </div>
                                <div className="flex justify-between border-b border-slate-200 pb-1">
                                    <span className="font-bold text-slate-500">Client / Owner:</span>
                                    <span className="font-bold text-slate-900">{clientName || "-"}</span>
                                </div>
                                <div className="flex justify-between border-b border-slate-200 pb-1">
                                    <span className="font-bold text-slate-500">Lead Engineer:</span>
                                    <span className="font-bold text-slate-900">{engineerName || "-"}</span>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            {/* Input Column */}
                            <div className="lg:col-span-7 space-y-6">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                                    <h2 className="flex items-center gap-2 text-lg font-bold mb-6 text-indigo-900 uppercase tracking-tight border-b pb-3">
                                        <i data-lucide="package" className="w-5 h-5 text-indigo-500"></i> 사양 및 설계 조건
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-400">배관 규격 (Pipe Size)</label>
                                            <select className="no-print w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none" value={pipeSize.name} onChange={(e) => setPipeSize(PIPE_SIZES.find(p => p.name === e.target.value))}>
                                                {PIPE_SIZES.map(p => <option key={p.name} value={p.name}>{p.name} (OD {p.od}mm)</option>)}
                                            </select>
                                            <div className="print-only font-bold text-indigo-700 p-2 bg-slate-50 rounded-lg">{pipeSize.name} (Outer Diameter: {pipeSize.od} mm)</div>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-400">배관 재질 (Material)</label>
                                            <select className="no-print w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none" value={pipeMaterial.name} onChange={(e) => setPipeMaterial(PIPE_MATERIALS.find(m => m.name === e.target.value))}>
                                                {PIPE_MATERIALS.map(m => <option key={m.name} value={m.name}>{m.name}</option>)}
                                            </select>
                                            <div className="print-only font-bold text-indigo-700 p-2 bg-slate-50 rounded-lg">{pipeMaterial.name}</div>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-400">보온재 (Insulation)</label>
                                            <select className="no-print w-full bg-slate-50 border border-slate-200 rounded-xl p-3 outline-none" value={insulationType.name} onChange={(e) => setInsulationType(INSULATION_TYPES.find(i => i.name === e.target.value))}>
                                                {INSULATION_TYPES.map(i => <option key={i.name} value={i.name}>{i.name}</option>)}
                                            </select>
                                            <div className="print-only font-bold text-indigo-700 p-2 bg-slate-50 rounded-lg">{insulationType.name}</div>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-400">보온 두께 (mm)</label>
                                            <input type="number" className="no-print w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-bold" value={insulationThick} onChange={(e) => setInsulationThick(Number(e.target.value))} />
                                            <div className="print-only font-bold text-indigo-700 p-2 bg-slate-50 rounded-lg">{insulationThick} mm</div>
                                        </div>
                                        <div className="space-y-1 md:col-span-2">
                                            <label className="text-xs font-bold text-slate-400">배관 길이 (Length, m)</label>
                                            <input type="number" className="no-print w-full bg-slate-50 border border-slate-200 rounded-xl p-3 font-bold" value={length} onChange={(e) => setLength(Number(e.target.value))} />
                                            <div className="print-only font-bold text-indigo-700 p-2 bg-slate-50 rounded-lg">{length} m</div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                                    <h2 className="flex items-center gap-2 text-lg font-bold mb-6 text-orange-900 uppercase tracking-tight border-b pb-3">
                                        <i data-lucide="thermometer" className="w-5 h-5 text-orange-500"></i> 운전 온도 조건
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-400">유체 온도 (Fluid Temp, ℃)</label>
                                            <input type="number" className="no-print w-full bg-orange-50 border border-orange-100 rounded-xl p-3 font-bold text-orange-700" value={fluidTemp} onChange={(e) => setFluidTemp(Number(e.target.value))} />
                                            <div className="print-only font-bold text-orange-700 p-2 bg-orange-50 rounded-lg">{fluidTemp} ℃</div>
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-xs font-bold text-slate-400">외기 온도 (Ambient Temp, ℃)</label>
                                            <input type="number" className="no-print w-full bg-blue-50 border border-blue-100 rounded-xl p-3 font-bold text-blue-700" value={ambientTemp} onChange={(e) => setAmbientTemp(Number(e.target.value))} />
                                            <div className="print-only font-bold text-blue-700 p-2 bg-blue-50 rounded-lg">{ambientTemp} ℃</div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Result Column */}
                            <div className="lg:col-span-5 space-y-6">
                                <div className="bg-indigo-900 p-8 rounded-[2.5rem] shadow-2xl text-white">
                                    <h2 className="text-indigo-300 text-xs font-black uppercase mb-8 tracking-widest border-b border-indigo-800 pb-2">Calculation Result</h2>
                                    <div className="space-y-8">
                                        <div>
                                            <p className="text-indigo-200/60 text-[10px] mb-1 font-bold uppercase tracking-widest">Total Energy Loss (Watts)</p>
                                            <p className="text-6xl font-black">{calcData.watts.toLocaleString(undefined, {maximumFractionDigits: 0})}<span className="text-2xl ml-1 text-indigo-300">W</span></p>
                                        </div>
                                        <div>
                                            <p className="text-indigo-200/60 text-[10px] mb-1 font-bold uppercase tracking-widest">Heat Flux (kcal/h)</p>
                                            <p className="text-5xl font-black text-orange-400">{calcData.kcal.toLocaleString(undefined, {maximumFractionDigits: 0})}<span className="text-xl ml-1 font-bold text-white opacity-70">kcal/h</span></p>
                                        </div>
                                        <div className="pt-6 border-t border-indigo-800 text-xs text-indigo-300 flex justify-between">
                                            <span>Unit Heat Loss (Per Meter)</span>
                                            <span className="font-bold text-white">{(calcData.kcal / length).toFixed(1)} kcal/h·m</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Step by Step Rollback */}
                                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden step-box">
                                    <div className="p-4 bg-slate-50 border-b flex justify-between items-center no-print">
                                        <span className="text-xs font-black text-slate-500 uppercase">Calculation Steps</span>
                                    </div>
                                    
                                    <div className="p-6 space-y-6 text-[13px]">
                                        <div>
                                            <p className="font-bold text-indigo-600 mb-2 underline underline-offset-4">Step 1. 반지름 결정 (Radii)</p>
                                            <ul className="bg-slate-50 p-3 rounded-xl font-mono text-[11px] leading-relaxed">
                                                <li>· r1 (내경 반지름) = {pipeSize.od} / 2 = {(calcData.r1*1000).toFixed(1)}mm = {calcData.r1.toFixed(4)}m</li>
                                                <li>· r2 (외경 반지름) = r1 + {insulationThick}mm = {(calcData.r2*1000).toFixed(1)}mm = {calcData.r2.toFixed(4)}m</li>
                                            </ul>
                                        </div>

                                        <div>
                                            <p className="font-bold text-indigo-600 mb-2 underline underline-offset-4">Step 2. 보정 열전도율 (Conductivity)</p>
                                            <ul className="bg-slate-50 p-3 rounded-xl font-mono text-[11px] leading-relaxed">
                                                <li>· k_adj = {calcData.k_adj.toFixed(4)} W/m·K</li>
                                                <li><span className="text-slate-400 italic font-sans text-[10px]">*E-glass fiber의 경우 온도 보정 계수 적용됨</span></li>
                                            </ul>
                                        </div>

                                        <div>
                                            <p className="font-bold text-indigo-600 mb-2 underline underline-offset-4">Step 3. 열저항 계수 (Resistance)</p>
                                            <ul className="bg-slate-50 p-3 rounded-xl font-mono text-[11px] leading-relaxed">
                                                <li>· 단열재 저항 (R_ins) = ln(r2/r1) / k = {calcData.resInsul.toFixed(4)}</li>
                                                <li>· 표면 대류 저항 (R_conv) = 1 / (h · r2) = {calcData.resConv.toFixed(4)}</li>
                                            </ul>
                                        </div>

                                        <div className="pt-4 border-t border-slate-100">
                                            <p className="font-bold text-indigo-600 mb-2 underline underline-offset-4">Step 4. 최종 열량 산출 (Formula)</p>
                                            <div className="bg-indigo-50 p-4 rounded-xl font-mono text-center">
                                                <p className="text-[14px] font-bold text-indigo-900 mb-2">Q = (2π · L · ΔT) / (R_ins + R_conv)</p>
                                                <p className="text-indigo-600 text-[12px] font-bold">Total Heat Loss: {calcData.kcal.toLocaleString(undefined, {maximumFractionDigits: 1})} kcal/h</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="print-only mt-10 p-4 border-2 border-dashed border-slate-300 rounded-2xl text-center">
                                    <p className="text-slate-400 text-[10px] font-bold uppercase tracking-[0.2em]">Engineering Document - Confidential</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
